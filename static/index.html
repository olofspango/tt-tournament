<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Table Tennis Standings</title>
    <link rel="stylesheet" href="/static/style.css" />
</head>

<body data-page="dashboard">
    <div class="page">
        <header>
            <h1>Table Tennis Tournament</h1>
            <p>Live pool standings, semi-final bracket, and final match.</p>
            <nav>
                <a href="/live-score">Live score</a>
            </nav>
        </header>

        <section class="summary">
            <div class="card">
                <h2>Pool A</h2>
                <div class="table-container">
                    <table id="pool-a-table">
                        <thead>
                            <tr>
                                <th>Player</th>
                                <th>Pts</th>
                                <th>W</th>
                                <th>L</th>
                                <th>PF</th>
                                <th>PA</th>
                                <th>Diff</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
            <div class="card">
                <h2>Pool B</h2>
                <div class="table-container">
                    <table id="pool-b-table">
                        <thead>
                            <tr>
                                <th>Player</th>
                                <th>Pts</th>
                                <th>W</th>
                                <th>L</th>
                                <th>PF</th>
                                <th>PA</th>
                                <th>Diff</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </section>

        <section class="card" id="semifinals-section">
            <h2>Semi-finals</h2>
            <div id="semifinals"></div>
        </section>

        <section class="card" id="final-section">
            <h2>Final</h2>
            <div id="final"></div>
        </section>

        <footer>
            <p>Standings update automatically whenever scores change.</p>
        </footer>
    </div>
    <script src="/static/app.js"></script>
</body>

</html>
